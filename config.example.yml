discord:
  bot_token: "YOUR_DISCORD_BOT_TOKEN"

llm:
  host: "http://localhost:8080"  # llama.cpp server (llama-server), OpenAI-compatible /v1/chat/completions
  model: "local"  # llama-server serves whichever model it was launched with (-m <path>); this value is
                   # mostly cosmetic (some servers echo it back), but keep it descriptive for logs
  timeout: 300  # seconds to wait for a summary before giving up (long transcripts on a slow model can take a while)
  # Context window is NOT set here — llama-server fixes it at launch (`-c <n>`), not per request.
  # Make sure -c is large enough to fit the whole merged transcript, or it gets silently truncated
  # (see CLAUDE.md gotchas). Multi-hour sessions may need a large -c; more context uses more RAM/VRAM.

whisper:
  model_size: "turbo"    # tiny, base, small, medium, large-v2, large-v3, turbo
  device: "cpu"
  compute_type: "int8"
  language: null         # e.g. "en", or null to auto-detect
  hf_token: null          # only needed for gated models
  vad_filter: true        # skip silence/non-speech before transcribing (avoids hallucinated text on long silence)

players:
  - discord_id: 123456789012345678
    player_name: "Alice"
    character_name: "Lyra Nightshade"
